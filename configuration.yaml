
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 192.168.110.199
mqtt:
  sensor:
    # --- SENSOR 1 ---
    - name: "Suhu Ruangan 1"
      state_topic: "pc/sensor1/suhu"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      availability_topic: "pc/sensor/availability"

    - name: "Kelembaban Ruangan 1"
      state_topic: "pc/sensor1/kelembaban"
      unit_of_measurement: "%"
      device_class: humidity
      state_class: measurement
      availability_topic: "pc/sensor/availability"

    # --- SENSOR 2 ---
    - name: "Suhu Ruangan 2"
      state_topic: "pc/sensor2/suhu"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      availability_topic: "pc/sensor/availability"

    - name: "Kelembaban Ruangan 2"
      state_topic: "pc/sensor2/kelembaban"
      unit_of_measurement: "%"
      device_class: humidity
      state_class: measurement
      availability_topic: "pc/sensor/availability"

    # --- SENSOR 3 ---
    - name: "Suhu Ruangan 3"
      state_topic: "pc/sensor3/suhu"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      availability_topic: "pc/sensor/availability"

    - name: "Kelembaban Ruangan 3"
      state_topic: "pc/sensor3/kelembaban"
      unit_of_measurement: "%"
      device_class: humidity
      state_class: measurement
      availability_topic: "pc/sensor/availability"

  binary_sensor:
    - name: "Sensor Gerak Ruangan"
      state_topic: "pc/sensor/gerak"
      device_class: motion
      payload_on: "ON"
      payload_off: "OFF"
      availability_topic: "pc/sensor/availability"
  switch:
    - name: "Saklar Lampu Otomatis"
      state_topic: "pc/servo/switch/state"
      command_topic: "pc/servo/switch/set"
      availability_topic: "pc/sensor/availability"
      payload_available: "online"
      payload_not_available: "offline"
      payload_on: "ON"
      payload_off: "OFF"
      optimistic: false
      retain: false
